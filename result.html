<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>추천 결과 | Game Compass</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">GAME COMPASS</a>
    <button class="nav-toggle" id="navToggle" aria-label="메뉴 열기">☰</button>
    <nav class="nav" id="navMenu">
      <a href="index.html">홈</a>
      <a href="test.html">취향 테스트</a>
      <a href="games.html">게임 목록</a>
      <a href="favorites.html">즐겨찾기</a>
    </nav>
  </header>

  <main class="page-wrap">
    <section class="page-title center">
      <p class="eyebrow">RESULT</p>
      <h1>추천 결과</h1>
      <p id="resultSummary">당신의 취향과 가장 잘 맞는 게임을 분석했습니다.</p>
    </section>

    <section class="result-layout">
      <aside class="score-panel">
        <h2>취향 태그 점수</h2>
        <div id="scoreList"></div>
        <div class="result-actions">
          <button type="button" class="btn primary full" id="recalculateBtn">같은 취향으로 다시 추천</button>
          <a href="test.html" class="btn ghost full">테스트 다시하기</a>
          <a href="games.html" class="btn ghost full">게임 목록 보기</a>
        </div>
      </aside>
      <section class="recommend-area">
        <section class="recommend-list" id="recommendList"></section>
      </section>
    </section>
  </main>

  <footer class="footer">
    <p>Game Compass · Recommendation Result</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/result.js"></script>
</body>
</html>
