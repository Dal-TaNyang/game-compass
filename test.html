<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>취향 테스트 | Game Compass</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="fit-screen test-fit">
  <header class="site-header">
    <a class="logo" href="index.html">GAME COMPASS</a>
    <button class="nav-toggle" id="navToggle" aria-label="메뉴 열기">☰</button>
    <nav class="nav" id="navMenu">
      <a href="index.html">홈</a>
      <a href="test.html" class="active">취향 테스트</a>
      <a href="games.html">게임 목록</a>
      <a href="favorites.html">즐겨찾기</a>
    </nav>
  </header>

  <main class="page-wrap narrow test-page">
    <section class="page-title center">
      <p class="eyebrow">TASTE TEST</p>
      <h1>게임 취향 테스트</h1>
      <p>12개의 질문으로 핵심 취향과 관련 태그를 계산하고 100개 이상의 Steam 게임 중 추천 게임을 보여줍니다.</p>
    </section>

    <section class="test-box test-box-balanced test-box-wide test-box-loading" id="testBox">
      <div class="test-main-panel">
        <div class="progress-wrap">
          <div class="progress-info">
            <span id="questionCount">1 / 12</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar"><span id="progressBar"></span></div>
        </div>

        <h2 id="questionTitle"></h2>
        <div class="answer-list" id="answerList"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>Game Compass · Taste Test</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/test.js"></script>
</body>
</html>
